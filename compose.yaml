services:

  ########################################################################################
  # RESEARCH AI — lightweight lab for embedding & chunking experiments
  ########################################################################################
  research-backend:
    build:
      context: ./backend
    container_name: research-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/code
      - huggingface_hub:/huggingface
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HF_HOME=/huggingface
    depends_on:
      ollama:
        condition: service_healthy

  ########################################################################################
  research-frontend:
    build:
      context: ./frontend
    container_name: research-frontend
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - research-backend

  ########################################################################################
  # One-shot service: downloads jinaai/jina-embeddings-v3 into the huggingface_hub volume.
  # Run manually when needed:  docker compose run --rm model-downloader
  # Subsequent runs are instant — the model is already in the volume.
  ########################################################################################
  model-downloader:
    build:
      context: ./model_downloader
    container_name: model-downloader
    volumes:
      - huggingface_hub:/huggingface
    environment:
      - HF_HOME=/huggingface
    restart: "no"

  ########################################################################################
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - recentcode_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  recentcode_ollama_data:   # bge-m3 + qwen2.5 already downloaded — shared from previous project
    external: true
  huggingface_hub:          # jina-embeddings-v3 and future HuggingFace models
