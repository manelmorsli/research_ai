# ──────────────────────────────────────────────────────────────────────────────
# Research AI Lab — CI/CD Pipeline
#
# Stages:
#   check  → type-check frontend  +  lint backend Python
#   build  → Docker multi-arch images pushed to GHCR  (main only)
#   deploy → SSH into server, pull new images, restart  (main only)
#
# Required GitHub Secrets:
#   DEPLOY_SSH_KEY       → private SSH key (ED25519 recommended)
#   DEPLOY_SSH_KNOWN     → server's public key (output of ssh-keyscan HOST)
#   DEPLOY_USER          → SSH user on the server  (e.g. ubuntu)
#   DEPLOY_HOST          → server IP or hostname
#   DEPLOY_PATH          → absolute path to the project on the server
#                          (e.g. /home/ubuntu/research_ai)
# ──────────────────────────────────────────────────────────────────────────────
name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/research_ai

# ── shared permissions ────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write   # allows pushing to GHCR

# ── jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Frontend — TypeScript check + production build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — tsc + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Backend — Python syntax check + fast import validation
  #    (torch/transformers are too heavy for CI; full test coverage happens in
  #     integration tests on the actual server after deployment)
  # ────────────────────────────────────────────────────────────────────────────
  backend-check:
    name: Backend — lint + import check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lightweight deps (no torch/transformers in CI)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn[standard] python-multipart \
            httpx pydantic pymupdf pymupdf4llm selectolax \
            huggingface_hub

      - name: Compile-check all Python files
        working-directory: backend
        run: |
          python -m compileall -q app/

      - name: Validate router imports (mock heavy deps)
        working-directory: backend
        run: |
          python - <<'EOF'
          import sys, types

          # Stub out the modules that require torch/transformers
          for mod in ("torch", "transformers", "sentence_transformers"):
              sys.modules[mod] = types.ModuleType(mod)

          # Validate FastAPI app can be constructed
          from app.main import app
          assert len(app.routes) > 0, "No routes registered"
          print(f"OK — {len(app.routes)} routes registered")
          EOF

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Build & push Docker images to GHCR
  #    — runs only on push to main (not on PRs)
  #    — uses layer caching via GitHub Actions cache
  # ────────────────────────────────────────────────────────────────────────────
  docker-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
            image_suffix: backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            image_suffix: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.service.image_suffix }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Deploy — SSH into the server and restart with the new images
  #    Requires: DEPLOY_SSH_KEY, DEPLOY_SSH_KNOWN, DEPLOY_USER,
  #              DEPLOY_HOST, DEPLOY_PATH secrets
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_SSH_KNOWN }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "── Logging in to GHCR ──"
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "── Pulling latest images ──"
            docker compose -f compose.prod.yaml pull

            echo "── Restarting services ──"
            docker compose -f compose.prod.yaml up -d --remove-orphans

            echo "── Pruning old images ──"
            docker image prune -f --filter "until=24h"

            echo "── Done ✓ ──"
